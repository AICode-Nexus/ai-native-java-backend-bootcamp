name: demo-ci

on:
  push:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"
  pull_request:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run Maven tests
        run: ./mvnw test
