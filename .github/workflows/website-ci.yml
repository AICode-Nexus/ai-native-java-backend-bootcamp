name: website-ci

on:
  push:
    paths:
      - "website/**"
      - "README.md"
      - "docs/community.md"
      - "第*课-*/final-content.md"
      - ".github/workflows/website-ci.yml"
  pull_request:
    paths:
      - "website/**"
      - "README.md"
      - "docs/community.md"
      - "第*课-*/final-content.md"
      - ".github/workflows/website-ci.yml"

jobs:
  website-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run regression tests
        run: pnpm test

      - name: Type check
        run: pnpm type-check

      - name: Lint website
        run: pnpm lint

      - name: Build website
        run: pnpm build
